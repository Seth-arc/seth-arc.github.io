<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starlink Ground Station: Agent Onboarding — Interactive Training Demo</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --ink: #000000;
      --surface: #050505;
      --panel: #0a0a0a;
      --border: #222222;
      --muted: #666666;
      --body: #a0a0a0;
      --heading: #ffffff;
      --accent: #ffffff;
      /* pure white accents */
      --accent-glow: rgba(255, 255, 255, 0.05);
      --success: #00d68f;
      --warn: #ffaa00;
      --danger: #ff4d6a;
      --radius: 0px;
      /* brutalist, sharp corners */
      --font-display: 'IBM Plex Mono', monospace;
      --font-body: 'IBM Plex Mono', monospace;
      --font-mono: 'IBM Plex Mono', monospace;
      --glow-shadow: none;
      /* remove glow */
      --glass-bg: #000000;
      --glass-border: #222222;
      --glass-blur: none;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      /* slightly smaller base for more technical feel */
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--body);
      height: 100vh;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      letter-spacing: -0.01em;
      line-height: 1.5;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--ink);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 0px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .app-shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* ── PROGRESS ── */
    .global-progress {
      height: 2px;
      background: var(--surface);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .global-progress .bar {
      height: 100%;
      width: 0%;
      background: var(--heading);
      transition: width 0.6s ease;
    }

    /* ── CONTENT ── */
    .content-area {
      flex: 1;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .view-module {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }


    /* ── MODULE LAYOUT ── */
    .module-sidebar-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 60px;
      height: 100%;
      overflow: hidden;
    }

    #lessonContainer {
      height: 100%;
      overflow-y: auto;
      padding-right: 12px;
    }

    .xp-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--heading);
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--border);
      font-size: 0.82rem;
      backdrop-filter: blur(4px);
    }

    .lesson-nav {
      position: sticky;
      top: 40px;
      align-self: start;
    }

    .lesson-nav h3 {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .lesson-nav ul {
      list-style: none;
    }

    .lesson-nav li {
      margin-bottom: 8px;
    }

    .lesson-nav button {
      width: 100%;
      text-align: left;
      padding: 10px 0;
      background: transparent;
      border: none;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, padding-left 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lesson-nav button:hover {
      color: var(--heading);
      padding-left: 8px;
    }

    .lesson-nav button.active {
      color: var(--heading);
    }

    .lesson-nav button.completed {
      color: var(--body);
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      background: transparent;
      border: 1px solid var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .lesson-nav button.active .nav-dot {
      border-color: var(--heading);
      background: var(--heading);
    }

    .lesson-nav button.completed .nav-dot {
      border-color: var(--body);
      background: var(--body);
    }

    .lesson-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .lesson-panel h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      color: var(--heading);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .lesson-subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      display: inline-block;
    }

    .lesson-panel p {
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .three-container {
      position: relative;
      width: 100%;
      min-height: 480px;
      background: #000;
      border: 1px solid var(--border);
      overflow: hidden;
      margin: 24px 0;
      cursor: grab;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
    }

    .three-container:active {
      cursor: grabbing;
    }

    .three-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .three-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 18px;
      pointer-events: none;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .three-hud-left,
    .three-hud-right {
      pointer-events: auto;
    }

    .three-hud-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      background: rgba(10, 14, 23, 0.85);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--heading);
      backdrop-filter: blur(8px);
    }

    .three-hud-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .three-controls-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 18px;
      background: rgba(10, 14, 23, 0.88);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }

    .three-controls-panel label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .three-controls-panel input[type="range"] {
      width: 100px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .three-controls-panel button {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--heading);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .three-controls-panel button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .three-controls-panel button.active-toggle {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent);
    }

    .three-info-card {
      position: absolute;
      right: 18px;
      top: 50px;
      width: 280px;
      padding: 20px;
      background: var(--ink);
      border: 1px solid var(--border);
      z-index: 10;
      animation: fadeIn 0.4s ease-out;
      display: none;
    }

    .three-info-card.visible {
      display: block;
    }

    .three-info-card h4 {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 6px;
    }

    .three-info-card p {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--body);
      margin-bottom: 0;
    }

    .three-info-card .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-family: var(--font-mono);
      font-size: 0.72rem;
    }

    .three-info-card .stat-row .stat-label {
      color: var(--muted);
    }

    .three-info-card .stat-row .stat-val {
      color: var(--accent);
      font-weight: 500;
    }

    .hotspot-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }

    .hotspot-btn {
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--body);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .hotspot-btn:hover,
    .hotspot-btn.active {
      border-color: var(--heading);
      color: var(--ink);
      background: var(--heading);
    }

    /* ── DIAGRAM / SIGNAL / DRAG / QUIZ / SCENARIO ── */
    .diagram-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin: 24px 0;
      position: relative;
    }

    .diagram-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .signal-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
      padding: 12px 0;
    }

    .signal-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 8px;
    }

    .signal-node:hover {
      transform: translateY(-4px);
    }

    .node-circle {
      width: 64px;
      height: 64px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .signal-node:hover .node-circle,
    .signal-node.active .node-circle {
      border-color: var(--heading);
      background: var(--heading);
    }

    .node-circle svg {
      width: 26px;
      height: 26px;
      stroke: var(--body);
      fill: none;
      stroke-width: 1.5;
      transition: stroke 0.3s;
    }

    .signal-node:hover .node-circle svg,
    .signal-node.active .node-circle svg {
      stroke: var(--ink);
    }

    .node-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      max-width: 80px;
      transition: color 0.3s;
    }

    .signal-node:hover .node-label,
    .signal-node.active .node-label {
      color: var(--heading);
    }

    .signal-arrow {
      width: 36px;
      height: 2px;
      background: var(--border);
      position: relative;
      flex-shrink: 0;
    }

    .signal-arrow::after {
      content: '';
      position: absolute;
      right: -1px;
      top: -4px;
      border: 5px solid transparent;
      border-left: 6px solid var(--border);
    }

    .node-detail {
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 16px;
      animation: fadeSlide 0.3s ease;
    }

    .node-detail h4 {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 6px;
    }

    .node-detail p {
      font-size: 0.85rem;
      line-height: 1.65;
      margin-bottom: 0;
    }

    .drag-zone {
      margin: 24px 0;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .drag-zone-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .drag-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      min-height: 44px;
      padding: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .drag-item {
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--heading);
      cursor: grab;
      user-select: none;
      transition: all 0.2s;
    }

    .drag-item:active {
      cursor: grabbing;
      background: var(--ink);
      border-color: var(--heading);
    }

    .drag-item.placed {
      opacity: 0.1;
      pointer-events: none;
    }

    .drop-slots {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .drop-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drop-step-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      width: 60px;
      text-align: right;
      flex-shrink: 0;
    }

    .drop-slot {
      flex: 1;
      min-height: 54px;
      border: 1px dashed var(--muted);
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 10px 18px;
      font-size: 1rem;
      color: var(--muted);
      transition: all 0.2s;
    }

    .drop-slot.hover {
      border-color: var(--heading);
      background: var(--surface);
    }

    .drop-slot.filled {
      border: 1px solid var(--border);
      color: var(--heading);
      background: var(--panel);
    }

    .drop-slot.correct {
      border-color: var(--success);
      color: var(--success);
    }

    .drop-slot.wrong {
      border-color: var(--danger);
      color: var(--danger);
    }

    .quiz-block {
      margin: 24px 0;
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .quiz-question {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quiz-option {
      padding: 16px 24px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--body);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .quiz-option:hover {
      border-color: var(--heading);
      color: var(--ink);
      background: var(--heading);
    }

    .quiz-option.selected {
      border-color: var(--heading);
      background: var(--heading);
      color: var(--ink);
      font-weight: 600;
    }

    .quiz-option.correct {
      border-color: var(--success);
      background: var(--ink);
      color: var(--success);
    }

    .quiz-option.wrong {
      border-color: var(--danger);
      background: var(--ink);
      color: var(--danger);
    }

    .quiz-option:disabled {
      cursor: default;
    }

    .quiz-feedback {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.6;
      display: none;
    }

    .quiz-feedback.show {
      display: block;
    }

    .quiz-feedback.correct {
      background: rgba(0, 214, 143, 0.1);
      border: 1px solid rgba(0, 214, 143, 0.3);
      color: var(--success);
    }

    .quiz-feedback.wrong {
      background: rgba(255, 77, 106, 0.1);
      border: 1px solid rgba(255, 77, 106, 0.3);
      color: var(--danger);
    }

    .btn {
      padding: 14px 32px;
      border: 1px solid transparent;
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: var(--heading);
      color: var(--ink);
    }

    .btn-primary:hover {
      background: var(--surface);
      color: var(--heading);
      border-color: var(--heading);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--heading);
    }

    .btn-outline:hover {
      border-color: var(--heading);
      background: var(--heading);
      color: var(--ink);
    }

    .btn-sm {
      padding: 7px 16px;
      font-size: 0.8rem;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .scenario-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      margin: 20px 0;
    }

    .scenario-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .scenario-icon {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scenario-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--warn);
      fill: none;
      stroke-width: 2;
    }

    .scenario-tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--warn);
      font-weight: 500;
    }

    .chat-sim {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      font-family: var(--font-body);
      font-size: 0.88rem;
      line-height: 1.6;
      animation: fadeIn 0.4s ease;
    }

    .chat-bubble.customer {
      background: var(--surface);
      border-color: var(--warn);
      align-self: flex-start;
      color: var(--body);
    }

    .chat-bubble.agent {
      background: var(--ink);
      border-color: var(--heading);
      align-self: flex-end;
      color: var(--heading);
    }

    .chat-sender {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      font-weight: 500;
      color: var(--muted);
    }

    .chat-bubble.customer .chat-sender {
      color: var(--warn);
    }

    .chat-bubble.agent .chat-sender {
      color: var(--heading);
    }

    .response-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      padding: 16px;
      background: var(--ink);
      border: 1px dashed var(--border);
    }

    .response-options .opt-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--body);
      margin-bottom: 4px;
    }

    .score-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      text-align: center;
      margin: 24px 0;
    }

    .score-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      position: relative;
    }

    .score-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }

    .score-ring .bg {
      stroke: var(--surface);
    }

    .score-ring .fill {
      stroke: var(--success);

    /* ── LANDING OVERLAY ── */
    #landingOverlay {

      justify-content: center;

    #landingOverlay.dismissed {
      transform: scale(1.03);
      opacity: 0;
      pointer-events: none;
    }

    .landing-bg-grid {
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;

    @keyframes rotateGrid {

    .landing-bg-rings {

    .landing-bg-rings::before {

      animation: rotateRing 80s linear infinite reverse;

    .landing-bg-rings::after {
      content: '';
      position: absolute;
      inset: 40%;
      border: 1px solid rgba(255, 255, 255, 0.08);

    @keyframes rotateRing {

<body>

  <!-- ═══════════════════════════════════════ -->

  <div id="landingOverlay">

    </svg>

  <div class="app-shell">

    <div class="global-progress">
      <div class="bar" id="globalBar"></div>
    </div>

    <main class="content-area">

      <!-- ═══════════════════════════════════════ -->
      <!-- VIEW: TRAINING MODULE                  -->
      <!-- ═══════════════════════════════════════ -->
      <section class="view-module active" id="viewModule">


        <div class="module-sidebar-layout">

          <nav class="lesson-nav">

            </ul>

          <div
            style="position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden;">

  <script>
    (function () {
      /* ════════════════════════════════════════════════
         STATE
         ════════════════════════════════════════════════ */
      var TOTAL_LESSONS = 5;
      var state = {
        currentLesson: 0,

        completed: [false, false, false, false, false],
        quizScore: 0,
        quizTotal: 3,
        activeNode: null,
        dragItem: null,
        scenarioStep: 0,
        scenarioScore: 0,
        threeCleanup: null,
        xp: 0
      };

      /* XP System */
      function addXP(amount, reason) {
        state.xp += amount;
        var counter = document.getElementById('xpText');
        if (counter) {
          counter.textContent = state.xp + ' XP';
          counter.parentElement.style.animation = 'none';
          void counter.parentElement.offsetWidth; // trigger reflow
          counter.parentElement.style.animation = 'bump 0.4s ease-out';
        }
      }

      /* ════════════════════════════════════════════════
         LANDING PAGE & INITIALIZATION
         ════════════════════════════════════════════════ */
      function scrambleText(el, targetText, duration) {
        var chars = '01#@%*?+-_\\/[]{}';
        var queue = [];
        for (var i = 0; i < targetText.length; i++) {
          queue.push({
            from: chars[Math.floor(Math.random() * chars.length)],
            to: targetText[i],
            start: Math.floor(Math.random() * 20),
            end: Math.floor(Math.random() * 20) + Math.floor(duration / 16)
          });
        }
        var frame = 0;
        function update() {
          var output = '';
          var complete = 0;
          for (var i = 0; i < queue.length; i++) {
            var item = queue[i];
            if (frame >= item.end) {
              complete++;
              output += item.to;
            } else if (frame >= item.start) {
              item.char = Math.random() < 0.28 ? chars[Math.floor(Math.random() * chars.length)] : item.char || chars[0];
              output += item.char;
            } else {
              output += item.from;
            }
          }
          el.innerText = output;
          if (complete < queue.length) {
            requestAnimationFrame(update);
            frame++;
          }
        }
        update();
      }

      var s1 = document.getElementById('loadStep1');
      var st1 = document.getElementById('loadStatus1');
      var s2 = document.getElementById('loadStep2');
      var st2 = document.getElementById('loadStatus2');
      var s3 = document.getElementById('loadStep3');
      var st3 = document.getElementById('loadStatus3');
      var startBtn = document.getElementById('startBtn');
      var startBtnText = document.getElementById('startBtnText');
      var landingOverlay = document.getElementById('landingOverlay');

      setTimeout(function () {
        scrambleText(document.getElementById('scrambleTitle'), 'STARLINK GROUND STATION', 1200);
      }, 300);

      setTimeout(function () { s1.classList.add('active'); }, 800);
      setTimeout(function () { st1.className = 'status'; st1.innerText = 'OK'; s2.classList.add('active'); }, 1600);
      setTimeout(function () { st2.className = 'status'; st2.innerText = 'OK'; s3.classList.add('active'); }, 2400);
      setTimeout(function () {
        st3.className = 'status'; st3.innerText = 'OK';
        startBtn.classList.add('ready');
        startBtnText.innerText = 'INITIATE TRAINING';
        startBtn.disabled = false;
      }, 3200);

      startBtn.addEventListener('click', function () {
        if (!startBtn.classList.contains('ready')) return;
        landingOverlay.classList.add('dismissed');
      });

      var fullscreenBtn = document.getElementById('fullscreenBtn');
      if (fullscreenBtn) {
        fullscreenBtn.addEventListener('click', function () {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function (err) {
              console.log("Error attempting to enable fullscreen:", err.message);
            });
          } else {
            if (document.exitFullscreen) {
              document.exitFullscreen();
            }
          }
        });
      }

      /* ── MODULE STARTUP ── */
      renderLesson(state.currentLesson);

      /* ════════════════════════════════════════════════
         NAVIGATION
         ════════════════════════════════════════════════ */
      window.goLesson = function (idx) {
        if (state.threeCleanup) { state.threeCleanup(); state.threeCleanup = null; }
        state.currentLesson = idx;
        renderLesson(idx);
        updateNav();
      };

      function updateNav() {
        var btns = document.querySelectorAll('.lesson-nav button');
        btns.forEach(function (btn, i) {
          btn.classList.remove('active', 'completed');
          if (i === state.currentLesson) btn.classList.add('active');
          if (state.completed[i]) btn.classList.add('completed');
        });
        updateProgress();
      }

      function updateProgress() {
        var done = state.completed.filter(Boolean).length;
        document.getElementById('globalBar').style.width = ((done / TOTAL_LESSONS) * 100) + '%';
      }

      function completeLesson(idx) {
        state.completed[idx] = true;
        updateNav();
      }

      function renderLesson(idx) {
        var container = document.getElementById('lessonContainer');
        switch (idx) {
          case 0: renderLesson0(container); break;
          case 1: renderLesson1_3D(container); break;
          case 2: renderLesson2_Drag(container); break;
          case 3: renderLesson3_Scenario(container); break;
          case 4: renderLesson4_Quiz(container); break;
        }
        updateNav();
      }

      /* ════════════════════════════════════════════════
         LESSON 0: HOW STARLINK WORKS (signal chain)
         ════════════════════════════════════════════════ */
      var nodeDetails = [
        { title: 'LEO Satellite Constellation', desc: 'Starlink satellites orbit at ~550 km altitude \u2014 about 65x closer than traditional geostationary satellites. This dramatically reduces latency to around 20\u201340 ms. The constellation uses laser inter-satellite links to route data between satellites before reaching the nearest ground station.' },
        { title: 'Starlink Dish (Dishy)', desc: 'The phased-array antenna electronically steers its beam to track satellites as they cross the sky. It self-levels during setup and automatically searches for the best signal. The dish connects to the router via a single proprietary cable that carries both data and power.' },
        { title: 'Wi-Fi Router', desc: 'The Starlink router provides dual-band Wi-Fi (2.4 GHz and 5 GHz). It connects to the dish via Ethernet and manages the local network. Customers can manage settings through the Starlink app. Mesh nodes can extend coverage in larger homes.' },
        { title: 'Customer Device', desc: 'End-user devices (phones, laptops, smart TVs) connect to the Starlink router\'s Wi-Fi network like any standard home network. No special configuration is needed on the device side \u2014 the complexity is abstracted by the Starlink system.' }
      ];

      function signalNode(idx, svgContent, label) {
        return '<div class="signal-node" onclick="clickNode(' + idx + ')">' +
          '<div class="node-circle"><svg viewBox="0 0 24 24">' + svgContent + '</svg></div>' +
          '<div class="node-label">' + label + '</div></div>';
      }
      function signalArrow() { return '<div class="signal-arrow"></div>'; }

      function renderLesson0(el) {
        el.innerHTML =
          '<div class="lesson-panel">' +
          '<div class="lesson-subtitle">Lesson 1 of 5 \u2014 Explore &amp; Discover</div>' +
          '<h2>How Starlink Works</h2>' +
          '<p>Before you can help customers set up their Starlink kit, you need to understand the signal chain \u2014 the path data travels from a satellite in low Earth orbit all the way to a customer\'s device. Click each node below to explore the chain.</p>' +
          '<div class="diagram-container">' +

      /* ── Three.js Scene ── */
      var _scene, _camera, _renderer, _earth, _satMesh, _orbitsGroup, _labelsGroup;
      var _showOrbits = false, _showLabels = false;
      var _mouseDown = false, _mouseX = 0, _mouseY = 0;
      var _rotX = 0.3, _rotY = 0, _targetRotX = 0.3, _targetRotY = 0;
      var _camDist = 4.0, _targetDist = 4.0;
      var _satPositions = [];
      var _animId = null;

      function initThreeScene() {
        var mount = document.getElementById('threeMount');
        if (!mount) return;
        var w = mount.clientWidth;
        var h = mount.clientHeight - 44; // minus controls bar

        _scene = new THREE.Scene();
        _camera = new THREE.PerspectiveCamera(50, w / Math.max(h, 1), 0.1, 100);
        _camera.position.set(0, 0, _camDist);

        _renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        _renderer.setSize(w, h);
        _renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        _renderer.setClearColor(0x050810, 1);
        mount.insertBefore(_renderer.domElement, mount.firstChild);

        // Ambient + directional light
        _scene.add(new THREE.AmbientLight(0x334466, 0.6));
        var sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 3, 5);
        _scene.add(sun);

        // Earth
        var earthGeo = new THREE.SphereGeometry(1, 64, 64);
        var earthCanvas = document.createElement('canvas');
        earthCanvas.width = 512; earthCanvas.height = 256;
        var ctx = earthCanvas.getContext('2d');
        generateEarthTexture(ctx, 512, 256);
        var earthTex = new THREE.CanvasTexture(earthCanvas);
        var earthMat = new THREE.MeshPhongMaterial({
          map: earthTex,
          shininess: 15,
          specular: 0x111122
        });
        _earth = new THREE.Mesh(earthGeo, earthMat);
        _scene.add(_earth);

        // Atmosphere glow
        var atmosGeo = new THREE.SphereGeometry(1.025, 48, 48);
        var atmosMat = new THREE.MeshBasicMaterial({
          color: 0x4488ff,
          transparent: true,
          opacity: 0.08,
          side: THREE.BackSide
        });
        _scene.add(new THREE.Mesh(atmosGeo, atmosMat));

        // Generate satellite positions for multiple orbital planes
        _satPositions = generateStarlinkPositions(240);

        // Satellites as instanced mesh (small spheres)
        var satGeo = new THREE.SphereGeometry(0.012, 6, 6);
        var satMat = new THREE.MeshBasicMaterial({ color: 0x00a3ff });
        _satMesh = new THREE.InstancedMesh(satGeo, satMat, _satPositions.length);
        _scene.add(_satMesh);

        // Orbit rings (hidden initially)
        _orbitsGroup = new THREE.Group();
        _orbitsGroup.visible = false;

        // Labels group placeholder
        _labelsGroup = new THREE.Group();
        _labelsGroup.visible = false;
        createLabelSprites(_labelsGroup);
        _scene.add(_labelsGroup);

        updateSatPositions(0);
        document.getElementById('satCountLabel').textContent = _satPositions.length + ' satellites (simulated)';
        document.getElementById('satCountDisplay').textContent = _satPositions.length;

        // Mouse / touch controls
        var cvs = _renderer.domElement;
        cvs.addEventListener('mousedown', function (e) { _mouseDown = true; _mouseX = e.clientX; _mouseY = e.clientY; });
        window.addEventListener('mouseup', function () { _mouseDown = false; });
        window.addEventListener('mousemove', function (e) {
          if (!_mouseDown) return;
          var dx = e.clientX - _mouseX;
          var dy = e.clientY - _mouseY;
          _targetRotY += dx * 0.005;
          _targetRotX += dy * 0.005;
          _targetRotX = Math.max(-1.2, Math.min(1.2, _targetRotX));
          _mouseX = e.clientX;
          _mouseY = e.clientY;
        });
        cvs.addEventListener('wheel', function (e) {
          e.preventDefault();
          _targetDist += e.deltaY * 0.003;
          _targetDist = Math.max(1.8, Math.min(8, _targetDist));
        }, { passive: false });

        // Touch
        var _touchId = null, _touchX = 0, _touchY = 0, _touchDist = 0;
        cvs.addEventListener('touchstart', function (e) {
          if (e.touches.length === 1) {
            _touchId = e.touches[0].identifier;
            _touchX = e.touches[0].clientX;
            _touchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            _touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          }
        }, { passive: true });
        cvs.addEventListener('touchmove', function (e) {
          e.preventDefault();
          if (e.touches.length === 1) {
            var dx = e.touches[0].clientX - _touchX;
            var dy = e.touches[0].clientY - _touchY;
            _targetRotY += dx * 0.005;
            _targetRotX += dy * 0.005;
            _targetRotX = Math.max(-1.2, Math.min(1.2, _targetRotX));
            _touchX = e.touches[0].clientX;
            _touchY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            _targetDist += (_touchDist - d) * 0.01;
            _targetDist = Math.max(1.8, Math.min(8, _targetDist));
            _touchDist = d;
          }
        }, { passive: false });

        // Resize
        function onResize() {
          if (!mount || !mount.parentElement) return;
          var nw = mount.clientWidth;
          var nh = mount.clientHeight - 44;
          _camera.aspect = nw / Math.max(nh, 1);
          _camera.updateProjectionMatrix();
          _renderer.setSize(nw, nh);

        window.addEventListener('resize', onResize);

        // Animate
        var startTime = Date.now();
        function animate() {
          _animId = requestAnimationFrame(animate);
          var speed = (document.getElementById('speedSlider') ? document.getElementById('speedSlider').value : 30) / 100;
          var elapsed = (Date.now() - startTime) * 0.001 * speed;

          _rotX += (_targetRotX - _rotX) * 0.08;
          _rotY += (_targetRotY - _rotY) * 0.08;
          _camDist += (_targetDist - _camDist) * 0.08;

          _camera.position.x = _camDist * Math.sin(_rotY) * Math.cos(_rotX);
          _camera.position.y = _camDist * Math.sin(_rotX);
          _camera.position.z = _camDist * Math.cos(_rotY) * Math.cos(_rotX);
          _camera.lookAt(0, 0, 0);

          _earth.rotation.y = elapsed * 0.03;

      /* Procedural Earth texture */
      function generateEarthTexture(ctx, w, h) {
        // Base ocean gradient
        var grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#1a3a5c');
        grad.addColorStop(0.15, '#1a3a5c');
        grad.addColorStop(0.3, '#0e2d4a');
        grad.addColorStop(0.5, '#0d2844');
        grad.addColorStop(0.7, '#0e2d4a');
        grad.addColorStop(0.85, '#1a3a5c');
        grad.addColorStop(1, '#1a3a5c');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Polar ice
        ctx.fillStyle = 'rgba(200,220,240,0.5)';
        ctx.fillRect(0, 0, w, 18);
        ctx.fillRect(0, h - 18, w, 18);

        // Procedural continents using noise-like shapes
        ctx.fillStyle = '#1a4a2a';
        var continents = [
          // North America
          [[120, 50], [140, 45], [175, 55], [185, 75], [170, 90], [150, 95], [130, 90], [115, 78], [110, 60]],
          // South America
          [[150, 110], [165, 105], [175, 115], [178, 140], [170, 165], [155, 170], [145, 155], [140, 130]],
          // Europe
          [[255, 48], [275, 42], [290, 48], [285, 62], [275, 68], [260, 65], [250, 58]],
          // Africa
          [[260, 72], [280, 68], [300, 80], [305, 105], [295, 130], [275, 138], [260, 125], [255, 100], [252, 82]],
          // Asia
          [[290, 35], [320, 28], [370, 30], [400, 38], [410, 55], [395, 68], [370, 75], [340, 72], [310, 65], [295, 55]],
          // India
          [[325, 72], [340, 75], [335, 100], [320, 98], [315, 82]],
          // Australia
          [[375, 120], [405, 115], [415, 130], [405, 145], [385, 148], [372, 135]],
          // SE Asia islands
          [[365, 80], [380, 82], [378, 92], [368, 90]],
          [[385, 88], [398, 85], [400, 98], [388, 100]]
        ];

        continents.forEach(function (pts) {
          ctx.beginPath();
          ctx.moveTo(pts[0][0], pts[0][1]);
          for (var i = 1; i < pts.length; i++) {
            var prev = pts[i - 1];
            var cur = pts[i];
            var cpx = (prev[0] + cur[0]) / 2 + (Math.random() - 0.5) * 8;
            var cpy = (prev[1] + cur[1]) / 2 + (Math.random() - 0.5) * 8;
            ctx.quadraticCurveTo(cpx, cpy, cur[0], cur[1]);
          }
          ctx.closePath();
          ctx.fill();
        });

        // Texture noise overlay
        var imgData = ctx.getImageData(0, 0, w, h);
        var d = imgData.data;
        for (var i = 0; i < d.length; i += 4) {
          var n = (Math.random() - 0.5) * 12;
          d[i] = Math.max(0, Math.min(255, d[i] + n));
          d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + n));
          d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + n));
        }
        ctx.putImageData(imgData, 0, 0);

        // Grid lines (subtle latitude/longitude)
        ctx.strokeStyle = 'rgba(100,160,255,0.06)';
        ctx.lineWidth = 0.5;
        for (var lat = 0; lat <= h; lat += h / 12) {
          ctx.beginPath(); ctx.moveTo(0, lat); ctx.lineTo(w, lat); ctx.stroke();
        }
        for (var lon = 0; lon <= w; lon += w / 24) {
          ctx.beginPath(); ctx.moveTo(lon, 0); ctx.lineTo(lon, h); ctx.stroke();
        }
      }

      /* Generate Starlink satellite orbital elements */
      function generateStarlinkPositions(count) {
        var sats = [];
        // Multiple orbital planes mimicking Starlink shell 1 (53 deg) & shell 4 (97.6 deg)
        var planes = [
          { inclination: 53 * Math.PI / 180, alt: 1.086, count: Math.floor(count * 0.7), numPlanes: 24 },
          { inclination: 70 * Math.PI / 180, alt: 1.09, count: Math.floor(count * 0.2), numPlanes: 12 },
          { inclination: 97.6 * Math.PI / 180, alt: 1.095, count: count - Math.floor(count * 0.7) - Math.floor(count * 0.2), numPlanes: 6 }
        ];

        planes.forEach(function (shell) {
          var satsPerPlane = Math.ceil(shell.count / shell.numPlanes);
          for (var p = 0; p < shell.numPlanes; p++) {
            var raan = (p / shell.numPlanes) * Math.PI * 2;
            for (var s = 0; s < satsPerPlane; s++) {
              if (sats.length >= count) break;
              var trueAnomaly = (s / satsPerPlane) * Math.PI * 2 + (p * 0.15);
              sats.push({
                inclination: shell.inclination,
                raan: raan,
                trueAnomaly: trueAnomaly,
                alt: shell.alt + (Math.random() - 0.5) * 0.005,
                speed: 0.35 + Math.random() * 0.05
              });
            }
          }
        });
        return sats.slice(0, count);
      }

      function updateSatPositions(t) {
        if (!_satMesh) return;
        var dummy = new THREE.Object3D();
        for (var i = 0; i < _satPositions.length; i++) {
          var sat = _satPositions[i];
          var angle = sat.trueAnomaly + t * sat.speed;
          var r = sat.alt;

          // Position in orbital plane
          var x = r * Math.cos(angle);
          var z = r * Math.sin(angle);
          var y = 0;

          // Rotate by inclination around X
          var yi = y * Math.cos(sat.inclination) - z * Math.sin(sat.inclination);
          var zi = y * Math.sin(sat.inclination) + z * Math.cos(sat.inclination);

          // Rotate by RAAN around Y
          var xf = x * Math.cos(sat.raan) - zi * Math.sin(sat.raan);
          var zf = x * Math.sin(sat.raan) + zi * Math.cos(sat.raan);

          dummy.position.set(xf, yi, zf);
          dummy.updateMatrix();
          _satMesh.setMatrixAt(i, dummy.matrix);
        }
        _satMesh.instanceMatrix.needsUpdate = true;
      }

      function createOrbitRings(group) {
        var ringMat = new THREE.LineBasicMaterial({ color: 0x00a3ff, transparent: true, opacity: 0.12 });
        // Show a few representative orbital planes
        var shells = [
          { inc: 53 * Math.PI / 180, alt: 1.086, planes: 6 },
          { inc: 70 * Math.PI / 180, alt: 1.09, planes: 3 }
        ];
        shells.forEach(function (shell) {
          for (var p = 0; p < shell.planes; p++) {
            var raan = (p / shell.planes) * Math.PI * 2;
            var pts = [];
            for (var a = 0; a <= 64; a++) {
              var angle = (a / 64) * Math.PI * 2;
              var x = shell.alt * Math.cos(angle);
              var z = shell.alt * Math.sin(angle);
              var yi = -z * Math.sin(shell.inc);
              var zi = z * Math.cos(shell.inc);
              var xf = x * Math.cos(raan) - zi * Math.sin(raan);
              var zf = x * Math.sin(raan) + zi * Math.cos(raan);
              pts.push(new THREE.Vector3(xf, yi, zf));
            }
            var geo = new THREE.BufferGeometry().setFromPoints(pts);
            group.add(new THREE.Line(geo, ringMat));
          }
        });
      }

      function createLabelSprites(group) {
        var labels = [
          { text: 'Shell 1 (53\u00B0)', pos: [0, 1.2, 0] },
          { text: '550 km LEO', pos: [1.15, 0.5, 0] },
          { text: 'Laser Interlink', pos: [-0.8, 0.9, 0.6] }
        ];
        labels.forEach(function (lbl) {
          var canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          var ctx2 = canvas.getContext('2d');
          ctx2.fillStyle = 'rgba(10,14,23,0.8)';
          ctx2.fillRect(0, 0, 256, 64);
          ctx2.strokeStyle = '#00a3ff';
          ctx2.lineWidth = 1;
          ctx2.strokeRect(1, 1, 254, 62);
          ctx2.font = '500 22px "Space Grotesk", sans-serif';
          ctx2.fillStyle = '#e2e7f5';
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'middle';
          ctx2.fillText(lbl.text, 128, 32);
          var tex = new THREE.CanvasTexture(canvas);
          var spMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
          var sprite = new THREE.Sprite(spMat);
          sprite.position.set(lbl.pos[0], lbl.pos[1], lbl.pos[2]);
          sprite.scale.set(0.6, 0.15, 1);
          group.add(sprite);
        });
      }

      /* ════════════════════════════════════════════════
         LESSON 2: KIT SETUP SEQUENCE (drag & drop)
         ════════════════════════════════════════════════ */
      var setupSteps = [
        'Choose an open sky location',
        'Place the dish on a flat surface',
        'Plug the cable into the dish',
        'Route cable to router location',
        'Connect cable to router and power on',
        'Wait for dish to self-level and connect'
      ];

      function renderLesson2_Drag(el) {
        var shuffled = setupSteps.slice().sort(function () { return Math.random() - 0.5; });
        el.innerHTML =
          '<div class="lesson-panel">' +
          '<div class="lesson-subtitle">Lesson 3 of 5 \u2014 Sequencing &amp; Recall</div>' +
          '<h2>Kit Setup Sequence</h2>' +
          '<p>A customer just received their Starlink kit and is asking you to walk them through setup. Drag each step into the correct order to build the installation sequence.</p>' +
          '<div class="drag-zone">' +
          '<div class="drag-zone-label">Available Steps \u2014 Drag to the slots below</div>' +
          '<div class="drag-items" id="dragSource">' +
          shuffled.map(function (step) {
            return '<div class="drag-item" draggable="true" data-step="' + step + '">' + step + '</div>';
          }).join('') +
          '</div>' +
          '<div class="drop-slots" id="dropTarget">' +
          setupSteps.map(function (_, i) {
            return '<div class="drop-row"><div class="drop-step-num">Step ' + (i + 1) + '</div><div class="drop-slot" data-index="' + i + '">Drop here</div></div>';
          }).join('') +
          '</div>' +
          '</div>' +
          '<div id="dragFeedback"></div>' +
          '<div class="btn-row">' +
          '<button class="btn btn-outline btn-sm" onclick="renderLesson2_Drag(document.getElementById(\'lessonContainer\'))">Reset</button>' +
          '<button class="btn btn-primary" id="checkOrderBtn" onclick="checkOrder()" disabled>Check Order</button>' +
          '</div>' +
          '<div class="btn-row" style="margin-top:12px;">' +
          '<button class="btn btn-primary" onclick="goLesson(3)">Next: Troubleshooting <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>' +
          '</div>' +
          '</div>';
        initDragDrop();
      }

      function initDragDrop() {
        var source = document.getElementById('dragSource');
        var slots = document.querySelectorAll('.drop-slot');
        source.addEventListener('dragstart', function (e) {
          if (e.target.classList.contains('drag-item')) { state.dragItem = e.target; e.target.style.opacity = '0.5'; }
        });
        source.addEventListener('dragend', function (e) {
          if (e.target.classList.contains('drag-item')) e.target.style.opacity = '1';
        });
        slots.forEach(function (slot) {
          slot.addEventListener('dragover', function (e) { e.preventDefault(); slot.classList.add('hover'); });
          slot.addEventListener('dragleave', function () { slot.classList.remove('hover'); });
          slot.addEventListener('drop', function (e) {
            e.preventDefault(); slot.classList.remove('hover');
            if (state.dragItem && !slot.classList.contains('filled')) {
              slot.textContent = state.dragItem.getAttribute('data-step');
              slot.setAttribute('data-placed', state.dragItem.getAttribute('data-step'));
              slot.classList.add('filled');
              state.dragItem.classList.add('placed');
              state.dragItem = null;
              checkAllFilled();
            }
          });
        });
      }

      function checkAllFilled() {
        var slots = document.querySelectorAll('.drop-slot');
        var allFilled = true;
        slots.forEach(function (s) { if (!s.classList.contains('filled')) allFilled = false; });
        document.getElementById('checkOrderBtn').disabled = !allFilled;
      }

      window.checkOrder = function () {
        var slots = document.querySelectorAll('.drop-slot');
        var allCorrect = true;
        slots.forEach(function (slot, i) {
          if (slot.getAttribute('data-placed') === setupSteps[i]) { slot.classList.add('correct'); }
          else { slot.classList.add('wrong'); allCorrect = false; }
        });
        var fb = document.getElementById('dragFeedback');
        if (allCorrect) {
          if (!state._dragCompleted) {
            addXP(100, 'Sequence Correct');
            state._dragCompleted = true;
          }
          fb.innerHTML = '<div class="quiz-feedback show correct">All steps in the correct order. You\'re ready to guide a customer through kit setup.</div>';
          completeLesson(2);
        } else {
          fb.innerHTML = '<div class="quiz-feedback show wrong">Some steps are out of order. Review the sequence and try again \u2014 remember, the dish needs an open sky view before anything else.</div>';
        }
      };


      /* ════════════════════════════════════════════════
         LESSON 3: TROUBLESHOOTING SCENARIO
         ════════════════════════════════════════════════ */
      var scenario = {
        intro: 'A customer contacts support: \u201CI set up my Starlink yesterday and it was working great, but today the connection keeps dropping every few minutes.\u201D',
        steps: [
          {
            customer: "My internet keeps cutting out. It was fine yesterday but today it\u2019s terrible. I haven\u2019t moved anything.",
            options: [
              { text: "I understand how frustrating intermittent drops can be. Let me help. First, can you open the Starlink app and check if there are any obstruction alerts?", correct: true, feedback: "Excellent \u2014 checking for obstructions via the app is the correct first diagnostic step. Intermittent drops often correlate with partial sky obstructions that the dish detects." },
              { text: "Have you tried unplugging the router and plugging it back in?", correct: false, feedback: "While rebooting can help, jumping straight to a restart skips the diagnostic step. Checking the Starlink app for obstruction data first would give you actionable information to guide the conversation." },
              { text: "Let me escalate this to our Tier-2 team right away.", correct: false, feedback: "Premature escalation increases wait times for the customer and overloads Tier-2. Always complete basic diagnostics first \u2014 most intermittent issues have straightforward solutions." }
            ]
          },
          {
            customer: "OK I checked the app \u2014 it says \u2018Obstructed\u2019 and shows some red areas on the sky map. But I set it up yesterday and it was fine!",
            options: [
              { text: "That obstruction data updates over 24 hours as the dish maps the full sky. The red areas mean satellites are being blocked at certain positions. Can you check if any tree branches or new objects are near the dish\u2019s line of sight?", correct: true, feedback: "Exactly right. The obstruction map builds over time, so issues may only appear after the dish has tracked the full orbital pattern. Guiding the customer to check for physical obstructions is the correct next step." },
              { text: "The dish might be defective. Let me start a replacement order for you.", correct: false, feedback: "An obstruction alert points to a placement issue, not hardware failure. Initiating a replacement before ruling out environmental causes wastes resources and doesn\u2019t solve the customer\u2019s problem." },
              { text: "Try moving the dish to a different spot and see if it helps.", correct: false, feedback: "While relocation may be the solution, you should first help the customer understand what\u2019s causing the obstruction before suggesting they move the dish \u2014 the app\u2019s sky map provides specific guidance on where clear sky is needed." }
            ]
          }
        ]
      };

      function renderLesson3_Scenario(el) {
        state.scenarioStep = 0;
        state.scenarioScore = 0;
        el.innerHTML =
          '<div class="lesson-panel">' +
          '<div class="lesson-subtitle">Lesson 4 of 5 \u2014 Scenario-Based Decision Making</div>' +
          '<h2>Customer Troubleshooting</h2>' +
          '<p>Apply what you\'ve learned in a realistic customer interaction. Choose the best response at each turn.</p>' +
          '<div class="scenario-box">' +
          '<div class="scenario-header">' +
          '<div class="scenario-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>' +
          '<div class="scenario-tag">Live Scenario \u2014 Intermittent Connection Loss</div>' +
          '</div>' +
          '<p style="font-size:0.9rem;line-height:1.65;margin-top:8px;">' + scenario.intro + '</p>' +
          '</div>' +
          '<div id="scenarioArea"></div>' +
          '<div class="btn-row" style="margin-top:16px;">' +
          '<button class="btn btn-primary" onclick="goLesson(4)">Next: Knowledge Check <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>' +
          '</div>' +
          '</div>';
        renderScenarioStep();
      }

      function renderScenarioStep() {
        var area = document.getElementById('scenarioArea');
        if (state.scenarioStep >= scenario.steps.length) {
          area.innerHTML = '<div class="quiz-feedback show correct" style="margin-top:16px;">Scenario complete! You scored ' + state.scenarioScore + ' of ' + scenario.steps.length + ' correct on first attempt.</div>';
          completeLesson(3);
          return;
        }
        var step = scenario.steps[state.scenarioStep];
        area.innerHTML =
          '<div class="chat-sim" style="margin-top:16px;">' +
          '<div class="chat-bubble customer"><div class="chat-sender">Customer</div>' + step.customer + '</div>' +
          '</div>' +
          '<div class="response-options">' +
          '<div class="opt-label">Choose your response</div>' +
          step.options.map(function (opt, i) {
            return '<button class="quiz-option" onclick="pickScenarioOption(' + i + ')">' + opt.text + '</button>';
          }).join('') +
          '</div>' +
          '<div id="scenarioFeedback"></div>';
      }

      window.pickScenarioOption = function (idx) {
        var step = scenario.steps[state.scenarioStep];
        var opt = step.options[idx];
        var btns = document.querySelectorAll('.response-options .quiz-option');
        btns.forEach(function (btn, i) {
          btn.disabled = true;
          if (i === idx) btn.classList.add(opt.correct ? 'correct' : 'wrong');
          if (step.options[i].correct) btn.classList.add('correct');
        });
        if (opt.correct) {
          state.scenarioScore++;
          addXP(30, 'Correct Choice');
        }
        document.getElementById('scenarioFeedback').innerHTML =
          '<div class="quiz-feedback show ' + (opt.correct ? 'correct' : 'wrong') + '" style="margin-top:12px;">' + opt.feedback + '</div>' +
          '<div class="btn-row" style="margin-top:12px;"><button class="btn btn-sm btn-outline" onclick="advanceScenario()">Continue</button></div>';
      };

      window.advanceScenario = function () {
        state.scenarioStep++;
        renderScenarioStep();
      };


      /* ════════════════════════════════════════════════
         LESSON 4: KNOWLEDGE CHECK
         ════════════════════════════════════════════════ */
      var quizQuestions = [
        {
          q: "At what approximate altitude do Starlink satellites orbit?",
          opts: ["36,000 km (geostationary)", "550 km (low Earth orbit)", "2,000 km (medium Earth orbit)", "200 km (very low orbit)"],
          correct: 1,
          explanation: "Starlink satellites orbit at approximately 550 km in low Earth orbit \u2014 significantly closer than traditional geostationary satellites at 36,000 km, which is why latency is much lower."
        },
        {
          q: "A customer reports their dish shows \u2018Searching\u2019 for over 30 minutes after initial setup. What is the most likely first step?",
          opts: [
            "Initiate a hardware replacement",
            "Ask them to check the Starlink app for obstruction data and verify the dish has clear sky access",
            "Suggest they reboot their home Wi-Fi router",
            "Escalate to Tier-2 engineering immediately"
          ],
          correct: 1,
          explanation: "A prolonged \u2018Searching\u2019 state most commonly indicates an obstruction issue. Checking the app\u2019s obstruction map and verifying clear sky access is always the correct first diagnostic step before considering hardware issues or escalation."
        },
        {
          q: "What connects the Starlink dish to the router?",
          opts: [
            "Standard Ethernet cable (Cat-6)",
            "USB-C cable",
            "A proprietary cable carrying data and power",
            "Wireless mesh connection"
          ],
          correct: 2,
          explanation: "The Starlink dish uses a proprietary cable that carries both data and power to the router. This is important to communicate to customers \u2014 they cannot substitute it with a standard Ethernet cable."
        }
      ];

      function renderLesson4_Quiz(el) {
        state.quizScore = 0;
        state.quizStep = 0;
        window._quizContainerEl = el;
        renderQuizStep();
      }

      function renderQuizStep() {
        var el = window._quizContainerEl || document.getElementById('lessonContainer');
        var qi = state.quizStep;

        if (qi >= quizQuestions.length) {
          renderQuizResult(el);
          return;
        }

        var qq = quizQuestions[qi];
        el.innerHTML =
          '<div class="lesson-panel" style="display: flex; flex-direction: column;">' +
          '<div class="lesson-subtitle">Lesson 5 of 5 \u2014 Question ' + (qi + 1) + ' of ' + quizQuestions.length + '</div>' +
          '<h2>Knowledge Check</h2>' +
          '<div class="quiz-block" id="quiz' + qi + '" style="flex: 1; margin: 12px 0;">' +
          '<div class="quiz-question">' + qq.q + '</div>' +
          '<div class="quiz-options">' +
          qq.opts.map(function (opt, oi) {
            return '<button class="quiz-option" onclick="answerQuizStep(' + qi + ',' + oi + ')">' + opt + '</button>';
          }).join('') +
          '</div>' +
          '<div class="quiz-feedback" id="quizFb' + qi + '"></div>' +
          '</div>' +
          '<div class="btn-row" id="quizNextBtnContainer" style="margin-top:auto;"></div>' +
          '</div>';
      }

      window.answerQuizStep = function (qi, oi) {
        var qq = quizQuestions[qi];
        var block = document.getElementById('quiz' + qi);
        var btns = block.querySelectorAll('.quiz-option');
        var fb = document.getElementById('quizFb' + qi);
        if (btns[0].disabled) return;

        var isCorrect = oi === qq.correct;
        if (isCorrect) {
          state.quizScore++;
          addXP(50, 'Correct Answer');
        }

        btns.forEach(function (btn, i) {
          btn.disabled = true;
          if (i === oi) btn.classList.add(isCorrect ? 'correct' : 'wrong');
          if (i === qq.correct) btn.classList.add('correct');
        });

        fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong');
        fb.textContent = qq.explanation;

        document.getElementById('quizNextBtnContainer').innerHTML =
          '<button class="btn btn-primary" onclick="nextQuizStep()">Next <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>';
      };

      window.nextQuizStep = function () {
        state.quizStep++;
        renderQuizStep();
      };

      function renderQuizResult(el) {
        var pct = Math.round((state.quizScore / quizQuestions.length) * 100);
        var passed = state.quizScore >= 2;
        var circ = 2 * Math.PI * 52;
        var offset = circ - (pct / 100) * circ;

        el.innerHTML =
          '<div class="lesson-panel">' +
          '<div class="lesson-subtitle">Lesson 5 of 5 \u2014 Summative Assessment</div>' +
          '<h2>Knowledge Check Complete</h2>' +
          '<div class="score-panel">' +
          '<div class="score-ring">' +
          '<svg viewBox="0 0 120 120">' +
          '<circle class="bg" cx="60" cy="60" r="52"/>' +
          '<circle class="fill" cx="60" cy="60" r="52" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" style="stroke:' + (passed ? 'var(--success)' : 'var(--danger)') + '"/>' +
          '</svg>' +
          '<div class="score-value">' + pct + '%</div>' +
          '</div>' +
          '<h3 style="font-family:var(--font-display);font-size:1.2rem;color:var(--heading);margin-bottom:8px;">' +
          (passed ? 'Certification Earned' : 'Not Yet \u2014 Review and Retry') +
          '</h3>' +
          '<p style="font-size:0.9rem;max-width:400px;margin:0 auto;">' +
          'You answered ' + state.quizScore + ' of ' + quizQuestions.length + ' questions correctly. ' +
          (passed ? 'You\'ve demonstrated the foundational knowledge needed to support Starlink customers with kit setup.' : 'Review the earlier lessons and try again \u2014 you need at least 2 correct to pass.') +
          '</p>' +
          '</div>' +
          '<div class="btn-row" style="margin-top:16px;">' +
          '<button class="btn btn-outline" onclick="renderLesson4_Quiz(document.getElementById(\'lessonContainer\'))">Retry Assessment</button>' +
          '</div>' +
          '</div>';

        if (passed) completeLesson(4);
      }

      updateProgress();
    })();
  </script>
</body>

</html>
